baseURL: "https://elnyy.github.io/"
defaultContentLanguage: "ja"
languageCode: "ja-jp"
hasCJKLanguage: true
title: elnyy
pagination.pagerSize: 5
theme: PaperMod

# HTMLコードをコンパイルできるように
markup:
  goldmark:
    renderer:
      unsafe: true


minify:
  minifyOutput: true

params:
  disableThemeToggle: true
  ShowReadingTime: true
  ShowPostNavLinks: true
  ShowShareButton: true
  ShowBreadCrumbs: true
  UseHugoToc: false 
  DateFormat: "2006年1月2日"
  cover:
    hiddenInList: false
    hiddenInSingle: false

profileMode:
  enabled: false


menu:
  main:
    - identifier: categories
      name: カテゴリー
      url: /categories/
      weight: 10
    - identifier: archives
      name: アーカイブ
      url: /archives/
      weight: 30
    - identifier: search
      name: 検索
      url: /search/
      weight: 40

outputs:
  home:
    - HTML
    - JSON # necessary for search
