baseURL: "https://elnyy.github.io/"
defaultContentLanguage: "ja"
title: elnyy
paginate: 5
theme: papermod

minify:
  disableXML: true
  minifyOutput: true

params:
  disableThemeToggle: true
  ShowReadingTime: true
  ShowShareButton: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowWordCount: true
  UseHugoToc: false 

profileMode:
  enabled: false


menu:
  main:
    - identifier: categories
      name: Categories
      url: /categories/
      weight: 10
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 20
    - identifier: archives
      name: Archives
      url: /archives/
      weight: 30
    - identifier: search
      name: Search
      url: /search/
      weight: 40

outputs:
  home:
    - HTML
    - JSON # necessary for search
