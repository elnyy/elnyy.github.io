baseURL: "https://elnyy.github.io/"
languageCode: "ja-JP"
title: elnyy
paginate: 5
theme: "PaperMod"

module:
  imports:
  - path: github.com/adityatelange/hugo-PaperMod

minify:
  disableXML: true
  minifyOutput: true

params:
  disableThemeToggle: true
  ShowReadingTime: true
  ShowShareButton: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowWordCount: true
  UseHugoToc: false 

profileMode:
  enabled: false
