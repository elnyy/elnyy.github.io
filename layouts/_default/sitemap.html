{{ define "main" }}
<article class="post">

  <header>
    <h1>{{ .Title }}</h1>
  </header>

  <section class="content">
    {{ range .Site.Sections }}
      <ul>
        {{ range .Pages }}
          <li>
            <a href="{{ .RelPermalink }}">{{ .Title }}</a>
            <small>({{ .PublishDate.Format "2006-01-02" }})</small>
          </li>
        {{ end }}
      </ul>
    {{ end }}
  </section>
</article>

{{ end }}
